version: "3.8"

services:
  # Jenkins: the CI/CD server that will build your image when changes are merged.
  jenkins:
    build: .
    image: jenkinspython
    container_name: jenkins
    ports:
      - "8080:8080" # Jenkins UI
      - "50000:50000" # Jenkins agent port
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Allow Jenkins to use host Docker
    networks:
      - cicd-net

  # Harbor DB: PostgreSQL instance required by Harbor.
  harbor-db:
    image: bitnami/postgresql:14
    container_name: harbor-db
    environment:
      - POSTGRESQL_PASSWORD=harbor7
      - POSTGRESQL_USERNAME=harbor7
      - POSTGRESQL_DATABASE=registry

    volumes:
      - harbor_db_data:/bitnami/postgresql
    networks:
      cicd-net:
        aliases:
          - postgresql
          - harbor-db

  # Harbor Core: The main Harbor API server.
  harbor-core:
    image: bitnami/harbor-core:latest
    container_name: harbor-core
    depends_on:
      - harbor-db
    environment:
      - CORE_SECRET=key111
      - CORE_KEY=secret333
      - DATABASE_URL=postgresql://harbor7:harbor7@harbor-db:5432/registry
    volumes:
      - ./harbor-core/app.conf:/etc/core/app.conf
    networks:
      - cicd-net

  # Harbor Registry: The Docker registry service.
  harbor-registry:
    image: bitnami/harbor-registry:latest
    container_name: harbor-registry
    depends_on:
      - harbor-db
    environment:
      - REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY=/storage
    volumes:
      - harbor_registry_data:/storage
      - ./harbor-registry/config.yml:/etc/registry/config.yml
    networks:
      - cicd-net

  # Harbor Portal: A simple UI for Harbor.
  harbor-portal:
    image: bitnami/harbor-portal:latest
    container_name: harbor-portal
    depends_on:
      - harbor-core
      - harbor-registry
    ports:
      - "8081:80" # Changed from 8082 to 8081 to match README
    networks:
      - cicd-net

  # Harbor Jobservice: Handles background jobs
  harbor-jobservice:
    image: bitnami/harbor-jobservice:latest
    container_name: harbor-jobservice
    depends_on:
      - harbor-core
    environment:
      - CORE_URL=http://harbor-core:8080
    volumes:
      - ./harbor-jobservice/config.yml:/etc/jobservice/config.yml
      - harbor_jobservice_logs:/var/log/jobs
    networks:
      - cicd-net
